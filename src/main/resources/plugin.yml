name: CopperKingdom
version: '${project.version}'
main: org.xpfarm.copperkingdom.CopperKingdom
api-version: '1.21'
description: Copper-based weapons with mythic lore mechanics including healing, grounding, and storm interactions
author: Carmelo Santana
website: https://xpfarm.org

commands:
  copperkingdom:
    description: Main command for Copper Kingdom plugin
    usage: /copperkingdom <give|blessed|test|reload|help> [args]
    aliases: [ck]
    permission: copperkingdom.use

permissions:
  copperkingdom.use:
    description: Basic permission to use Copper Kingdom commands
    default: op
  copperkingdom.give:
    description: Permission to give copper weapons and armor
    default: op
  copperkingdom.blessed:
    description: Permission to give blessed copper weapons
    default: op
  copperkingdom.test:
    description: Permission to use test commands for lore mechanics
    default: op
  copperkingdom.reload:
    description: Permission to reload plugin configuration
    default: op
